name: SKCS Triple Sync - 04:00, 12:00, 18:00

on:
  schedule:
    # Run at 04:00, 12:00, and 18:00 UTC daily
    - cron: '0 4,12,18 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-sports-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install supabase python-dotenv requests
        
    - name: Create .env file
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> backend/scripts/.env
        echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> backend/scripts/.env
        
    - name: Run Master Sync
      run: python skcs_master_sync.py
      
    - name: Sync completed
      run: echo "✅ Triple-sync completed at $(date)"
